name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false

      - name: Install devbox
        run: curl -fsSL https://get.jetify.com/devbox | bash -s -- -f

      - uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: GoReleaser
        run: devbox run -- goreleaser release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KO_DOCKER_REPO: ghcr.io/truvity/zitadel-operator

      - name: Package and push Helm charts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "${{ secrets.GITHUB_TOKEN }}" | devbox run -- helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          devbox run -- helm package charts/zitadel-operator --version "$VERSION" --app-version "$VERSION" --destination dist/
          devbox run -- helm package charts/zitadel-operator-crds --version "$VERSION" --app-version "$VERSION" --destination dist/
          devbox run -- helm push dist/zitadel-operator-${VERSION}.tgz oci://ghcr.io/truvity/charts
          devbox run -- helm push dist/zitadel-operator-crds-${VERSION}.tgz oci://ghcr.io/truvity/charts
