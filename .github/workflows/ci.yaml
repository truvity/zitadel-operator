name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - uses: jetify-com/devbox-install-action@v0.14.0
        with:
          enable-cache: true
          skip-nix-installation: true

      - run: devbox run -- just check
