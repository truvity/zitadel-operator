# v0.19 fleet shape: one org = one SA = one operator (org-owner binding, no
# ScopeMaps). Everything for a workload lives in its namespace; the project
# is declared as a CR and referenced with projectRef. Role keys follow the
# mechanical {namespace}:{role} vocabulary.
# See docs/install/deployment-shapes.md.
apiVersion: zitadel.truvity.io/v1alpha2
kind: Project
metadata:
  name: billing
  namespace: acme-billing
spec:
  organizationId: "325908855630427886"   # the operator's bound org
  assertRolesOnAuth: true                # roles in userinfo/tokens
---
# One role key per CR — several charts/namespaces can contribute roles to the
# same project without coordinating a single list (unlike Project spec.roles,
# which is an authoritative full-set sync; do not combine both).
apiVersion: zitadel.truvity.io/v1alpha2
kind: ProjectRole
metadata:
  name: billing-reader
  namespace: acme-billing
spec:
  projectRef:
    name: billing
  key: "acme-billing:reader"
  displayName: Billing reader
  group: acme-billing
---
apiVersion: zitadel.truvity.io/v1alpha2
kind: ProjectRole
metadata:
  name: billing-operator
  namespace: acme-billing
spec:
  projectRef:
    name: billing
  key: "acme-billing:operator"
  displayName: Billing operator
  group: acme-billing
---
apiVersion: zitadel.truvity.io/v1alpha2
kind: OIDCApp
metadata:
  name: billing-web
  namespace: acme-billing
spec:
  projectRef:
    name: billing
  type: confidential
  authMethod: basic
  redirectUris:
    - https://billing.example.com/oauth/callback
  secretRef:
    name: billing-web-oidc
---
# Machine identity granted a project role directly via projectRef (v0.19) —
# no scope-map project scope needed.
apiVersion: zitadel.truvity.io/v1alpha2
kind: MachineUser
metadata:
  name: billing-bot
  namespace: acme-billing
spec:
  organizationId: "325908855630427886"
  userName: billing-bot
  description: Billing reconciliation job
  projectRef:
    name: billing
  roles: ["acme-billing:reader"]
  key:
    rotateAfter: 2160h  # 90 days
  keySecretRef:
    name: billing-bot-key
