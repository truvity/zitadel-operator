project_name: zitadel-operator

version: 2

builds:
  - id: zitadel-operator
    main: ./cmd/operator
    binary: zitadel-operator
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

kos:
  - id: zitadel-operator
    build: zitadel-operator
    tags:
      - "{{.Version}}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64
    bare: true
    preserve_import_paths: false
    base_import_paths: true
    base_image: gcr.io/distroless/static:nonroot
    sbom: none
    labels:
      org.opencontainers.image.title: zitadel-operator
      org.opencontainers.image.version: "{{.Version}}"
      org.opencontainers.image.source: https://github.com/truvity/zitadel-operator

release:
  github:
    owner: truvity
    name: zitadel-operator
  header: |
    ## Zitadel Operator {{ .Tag }}

    Docker image: `ghcr.io/truvity/zitadel-operator:{{ .Version }}`
    Helm chart: `oci://ghcr.io/truvity/charts/zitadel-operator:{{ .Version }}`

changelog:
  use: github
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Bug Fixes
      regexp: '^fix'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
