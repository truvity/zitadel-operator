version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - unconvert
    - unparam
    - nolintlint
    - gosec

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    misspell:
      locale: US
    staticcheck:
      checks:
        - "all"
        - "-SA1019"  # suppress deprecated API warnings (Zitadel SDK v1 methods marked deprecated for v2)
        - "-ST1003"  # suppress naming convention warnings (CRD struct fields must match json camelCase tags)

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/truvity/zitadel-operator

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - unparam
