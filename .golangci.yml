version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - unconvert
    - unparam
    - nolintlint
    - gosec

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    misspell:
      locale: US
    staticcheck:
      checks:
        - "all"
        - "-ST1003"  # CRD types use json camelCase field names that conflict with Go ID naming (e.g., IdpId vs IdpID). Cannot fix without breaking the CRD API contract.

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/truvity/zitadel-operator

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - unparam
