version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - misspell
    - nolintlint
    - staticcheck
    - unconvert
    - unparam
    - unused
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
    misspell:
      locale: US
    staticcheck:
      checks:
        - "all"
        - "-ST1003"  # CRD types use json camelCase field names that conflict with Go ID naming (e.g., IdpId vs IdpID). Cannot fix without breaking the CRD API contract.
    gocyclo:
      # Go Report Card uses 15. We use 25 to allow standard controller-runtime
      # reconciler patterns (get→resolve→delete→finalizer→reconcile→status) which
      # inherently score 16-22. Anything above 25 should be refactored.
      min-complexity: 25

formatters:
  enable:
    - gofmt
    - goimports

  settings:
    goimports:
      local-prefixes:
        - github.com/truvity/zitadel-operator

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - unparam
        - gocyclo
    - path: cmd/operator/
      linters:
        - gocyclo
