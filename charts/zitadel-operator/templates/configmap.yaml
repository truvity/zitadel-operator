apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "zitadel-operator.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zitadel-operator.labels" . | nindent 4 }}
data:
  config.yaml: |
    domain: {{ .Values.config.domain | quote }}
    binding: {{ required "config.binding is required (iam-owner or org-owner)" .Values.config.binding | quote }}
    port: {{ .Values.config.port | quote }}
    insecure: {{ .Values.config.insecure }}
    {{- if .Values.config.externalDomain }}
    externalDomain: {{ .Values.config.externalDomain | quote }}
    {{- end }}
    keyFile: {{ .Values.credentials.mountPath }}/{{ .Values.credentials.key }}
    operatorNamespace: {{ .Values.config.operatorNamespace | default .Release.Namespace | quote }}
    {{- if .Values.config.watchNamespaces }}
    watchNamespaces:
      {{- range .Values.config.watchNamespaces }}
      - {{ . | quote }}
      {{- end }}
    {{- end }}
