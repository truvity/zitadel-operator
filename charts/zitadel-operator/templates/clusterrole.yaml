{{- if and .Values.rbac.create (not .Values.rbac.namespaces) -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "zitadel-operator.fullname" . }}
  labels:
    {{- include "zitadel-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - zitadel.truvity.io
    resources:
      - actionexecutions
      - actiontargets
      - apiapps
      - applicationkeys
      - domains
      - identityproviders
      - machineusers
      - oidcapps
      - organizations
      - orgmetadata
      - personalaccesstokens
      - projectgrantmembers
      - projectgrants
      - projectmembers
      - projects
      - samlapps
      - usergrants
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - zitadel.truvity.io
    resources:
      - actionexecutions/status
      - actiontargets/status
      - apiapps/status
      - applicationkeys/status
      - domains/status
      - identityproviders/status
      - machineusers/status
      - oidcapps/status
      - organizations/status
      - orgmetadata/status
      - personalaccesstokens/status
      - projectgrantmembers/status
      - projectgrants/status
      - projectmembers/status
      - projects/status
      - samlapps/status
      - usergrants/status
    verbs:
      - get
      - update
      - patch
  - apiGroups:
      - zitadel.truvity.io
    resources:
      - actionexecutions/finalizers
      - actiontargets/finalizers
      - apiapps/finalizers
      - applicationkeys/finalizers
      - domains/finalizers
      - identityproviders/finalizers
      - machineusers/finalizers
      - oidcapps/finalizers
      - organizations/finalizers
      - orgmetadata/finalizers
      - personalaccesstokens/finalizers
      - projectgrantmembers/finalizers
      - projectgrants/finalizers
      - projectmembers/finalizers
      - projects/finalizers
      - samlapps/finalizers
      - usergrants/finalizers
    verbs:
      - update
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - coordination.k8s.io
    resources:
      - leases
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - ""
    resources:
      - events
    verbs:
      - create
      - patch
{{- end }}
