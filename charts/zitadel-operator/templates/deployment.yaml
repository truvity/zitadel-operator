apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zitadel-operator.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "zitadel-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "zitadel-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "zitadel-operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "zitadel-operator.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --zitadel-domain={{ .Values.zitadel.domain }}
            - --zitadel-port={{ .Values.zitadel.port }}
            - --zitadel-insecure={{ .Values.zitadel.insecure }}
            {{- if .Values.zitadel.externalDomain }}
            - --external-domain={{ .Values.zitadel.externalDomain }}
            {{- end }}
            - --jwt-secret-name={{ .Values.zitadel.jwtSecretName }}
            - --jwt-secret-namespace={{ .Values.zitadel.jwtSecretNamespace }}
            {{- if .Values.zitadel.jwtSecretKey }}
            - --jwt-secret-key={{ .Values.zitadel.jwtSecretKey }}
            {{- end }}
            - --mode={{ .Values.zitadel.mode }}
            {{- if .Values.zitadel.project }}
            - --project={{ .Values.zitadel.project }}
            {{- end }}
            {{- if .Values.leaderElection.enabled }}
            - --leader-elect=true
            {{- end }}
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
