{{- if and .Values.rbac.create .Values.rbac.namespaces .Values.config.projectScopeLabel -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "zitadel-operator.fullname" . }}-namespaces
  labels:
    {{- include "zitadel-operator.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - namespaces
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "zitadel-operator.fullname" . }}-namespaces
  labels:
    {{- include "zitadel-operator.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "zitadel-operator.fullname" . }}-namespaces
subjects:
  - kind: ServiceAccount
    name: {{ include "zitadel-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
