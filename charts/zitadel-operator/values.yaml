image:
  repository: ghcr.io/truvity/zitadel-operator/operator
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 1

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true
  # Namespaces where the operator should have Role/RoleBindings.
  # If empty, uses ClusterRole (watches all namespaces).
  namespaces: []

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

# Operator configuration (rendered into ConfigMap).
config:
  domain: ""
  port: "443"
  insecure: false
  externalDomain: ""
  defaultOrganizationId: ""
  # Limit operator to these namespaces. Empty = all namespaces.
  watchNamespaces: []
  # Namespace label key for project scope enforcement.
  # When set, the operator validates that CRDs are in namespaces with this label.
  # Empty = no enforcement (backward-compatible).
  projectScopeLabel: ""

# JWT key Secret for authenticating to Zitadel.
credentials:
  secretName: zitadel-admin-sa
  key: zitadel-admin-sa.json
  mountPath: /etc/zitadel

leaderElection:
  enabled: true

nodeSelector: {}
tolerations: []
affinity: {}
