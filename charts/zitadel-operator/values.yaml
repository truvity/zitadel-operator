# Documentation: https://github.com/truvity/zitadel-operator/blob/master/docs/install/helm.md
# Config key semantics: docs/install/configuration.md
# Binding choice (iam-owner vs org-owner): docs/install/binding-levels.md

image:
  repository: ghcr.io/truvity/zitadel-operator/operator
  tag: ""
  pullPolicy: IfNotPresent

replicaCount: 1

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true
  # Namespaces where the operator should have Role/RoleBindings.
  # If empty, uses ClusterRole (watches all namespaces).
  namespaces: []

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 100m
    memory: 64Mi

# Operator configuration (rendered into ConfigMap).
config:
  domain: ""
  # NOTE: port is a string (quoted) — the operator config schema requires it.
  port: "443"
  insecure: false
  externalDomain: ""
  # Stable logical name for the bound instance (spec.instance pins, ScopeMap
  # assertions and SSA field-manager identity). Defaults to config.domain;
  # set it before go-live so a later domain migration cannot orphan pins.
  instanceAlias: ""
  # Binding assertion (v0.18, required): iam-owner | org-owner.
  # Verified at startup against the credential's actual memberships.
  binding: ""
  # Limit operator to these namespaces. Empty = all namespaces.
  # In namespaced mode the release namespace must be included (scope maps and
  # delegation Secrets live there).
  watchNamespaces: []
  # Namespace holding ScopeMap objects and delegation Secrets.
  # Defaults to the release namespace.
  operatorNamespace: ""

# JWT key Secret for authenticating to Zitadel.
credentials:
  secretName: zitadel-admin-sa
  key: zitadel-admin-sa.json
  mountPath: /etc/zitadel

# Leader election is on by default: even at replicas=1 a rolling update runs
# two pods at once. The lease ID derives from the Helm fullname so two
# deployments in one namespace never fight over a single lease.
leaderElection:
  enabled: true
  # Disabling leader election requires this explicit acknowledgement — a
  # rolling update always runs two pods at once, and without a lease both
  # mint delegates and write Secrets concurrently.
  acknowledgeDisabledRisk: false

nodeSelector: {}
tolerations: []
affinity: {}
