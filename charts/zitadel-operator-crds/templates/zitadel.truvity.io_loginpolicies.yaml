---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: loginpolicies.zitadel.truvity.io
spec:
  group: zitadel.truvity.io
  names:
    kind: LoginPolicy
    listKind: LoginPolicyList
    plural: loginpolicies
    singular: loginpolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: |-
          LoginPolicy is the Schema for the loginpolicies API.
          It manages an org-scoped login policy (ORG_OWNER, Management API).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: LoginPolicySpec defines the desired state of LoginPolicy
              (org-scoped).
            properties:
              allowDomainDiscovery:
                description: AllowDomainDiscovery enables org discovery by the domain
                  suffix of the login name.
                type: boolean
              allowExternalIdp:
                description: AllowExternalIdp allows login through configured external
                  identity providers.
                type: boolean
              allowRegister:
                description: AllowRegister allows user self-registration.
                type: boolean
              defaultRedirectUri:
                description: DefaultRedirectUri is where users land after login when
                  no app context exists.
                type: string
              disableLoginWithEmail:
                description: DisableLoginWithEmail disables login using email addresses.
                type: boolean
              disableLoginWithPhone:
                description: DisableLoginWithPhone disables login using phone numbers.
                type: boolean
              externalLoginCheckLifetime:
                description: ExternalLoginCheckLifetime is how long an external IdP
                  login stays valid (duration string).
                type: string
              forceMfa:
                description: ForceMfa requires multi-factor authentication for all
                  users.
                type: boolean
              forceMfaLocalOnly:
                description: ForceMfaLocalOnly requires MFA only for local (non-IdP)
                  authentication.
                type: boolean
              hidePasswordReset:
                description: HidePasswordReset hides the password-reset link on the
                  login form.
                type: boolean
              idps:
                description: Idps is the list of identity providers allowed for login
                  at the org level.
                items:
                  description: IdpReference references an identity provider either
                    by CR reference or raw ID.
                  properties:
                    idpId:
                      description: |-
                        IdpId references a pre-existing Zitadel identity provider by raw ID.
                        Mutually exclusive with IdpRef.
                      type: string
                    idpRef:
                      description: |-
                        IdpRef references a GoogleIdP CR managed by this operator.
                        Mutually exclusive with IdpId.
                      properties:
                        name:
                          description: Name is the name of the referenced resource.
                          type: string
                        namespace:
                          description: |-
                            Namespace is the namespace of the referenced resource.
                            If empty, defaults to the same namespace as the referencing resource.
                          type: string
                      required:
                      - name
                      type: object
                  type: object
                type: array
              ignoreUnknownUsernames:
                description: IgnoreUnknownUsernames shows the password step even for
                  unknown users (user-enumeration hardening).
                type: boolean
              instance:
                description: |-
                  Instance optionally pins this resource to one operator's instance
                  identity — the operator config's instanceAlias, defaulting to its
                  domain (v0.18 dual-serving). When set to another identity, the CR is
                  ignored entirely so the owning operator can manage it. When empty
                  while the namespace is served by two operators, both fail closed with
                  an AmbiguousInstance condition.
                type: string
              mfaInitSkipLifetime:
                description: MfaInitSkipLifetime is how long users may postpone MFA
                  setup (duration string; "0s" = no skip).
                type: string
              multiFactorCheckLifetime:
                description: MultiFactorCheckLifetime is how long a multi-factor check
                  stays valid (duration string).
                type: string
              multiFactors:
                description: MultiFactors is the list of allowed multi-factor types.
                items:
                  type: string
                type: array
              organizationId:
                description: |-
                  OrganizationId references a pre-existing Zitadel organization by raw ID.
                  Mutually exclusive with OrganizationRef.
                type: string
              organizationRef:
                description: |-
                  OrganizationRef references an Organization CR managed by this operator.
                  Mutually exclusive with OrganizationId.
                properties:
                  name:
                    description: Name is the name of the referenced resource.
                    type: string
                  namespace:
                    description: |-
                      Namespace is the namespace of the referenced resource.
                      If empty, defaults to the same namespace as the referencing resource.
                    type: string
                required:
                - name
                type: object
              passwordCheckLifetime:
                description: PasswordCheckLifetime is how long a password check stays
                  valid (Go/Zitadel duration string, e.g. "240h").
                type: string
              passwordlessType:
                description: PasswordlessType enables passwordless (passkey) login.
                enum:
                - not_allowed
                - allowed
                type: string
              secondFactorCheckLifetime:
                description: SecondFactorCheckLifetime is how long a second-factor
                  check stays valid (duration string).
                type: string
              secondFactors:
                description: SecondFactors is the list of allowed second factor types.
                items:
                  type: string
                type: array
              userLogin:
                description: UserLogin allows username/password login.
                type: boolean
            type: object
          status:
            description: LoginPolicyStatus defines the observed state of LoginPolicy.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the resource's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastSyncTime:
                description: LastSyncTime is the last time the resource was synced
                  with Zitadel.
                format: date-time
                type: string
              organizationId:
                description: OrganizationId is the resolved organization ID.
                type: string
              ready:
                description: Ready indicates whether the LoginPolicy is successfully
                  synced.
                type: boolean
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
