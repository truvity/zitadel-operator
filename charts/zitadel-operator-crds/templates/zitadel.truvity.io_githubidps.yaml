  names:
    kind: GitHubIdP
    listKind: GitHubIdPList
    plural: githubidps
    singular: githubidp
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.idpID
      name: IdpID
      type: string
    - jsonPath: .status.ready
      name: Ready
      type: boolean
    name: v1alpha2
    schema:
      openAPIV3Schema:
        description: |-
          GitHubIdP is the Schema for the githubidps API.
          It manages an instance-scoped GitHub identity provider (IAM_OWNER, Admin API).
          Uses Admin API AddGitHubProvider/UpdateGitHubProvider.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: GitHubIdPSpec defines the desired state of GitHubIdP.
            properties:
              clientId:
                description: ClientId is the GitHub OAuth2 client ID.
                type: string
              clientSecretRef:
                description: ClientSecretRef references the Secret containing the
                  GitHub OAuth2 client secret.
                properties:
                  key:
                    description: 'Key is the key within the Secret''s data. Default:
                      "clientSecret"'
                    type: string
                  name:
                    description: Name is the name of the Secret.
                    type: string
                required:
                - name
                type: object
              isAutoCreation:
                description: IsAutoCreation enables automatic user creation (same
                  as IsCreationAllowed in Zitadel API).
                type: boolean
              isAutoUpdate:
                description: IsAutoUpdate enables automatic user profile update on
                  GitHub login.
                type: boolean
              isCreationAllowed:
                description: IsCreationAllowed allows automatic user creation on first
                  GitHub login.
                type: boolean
              isLinkingAllowed:
                description: IsLinkingAllowed allows linking existing Zitadel accounts
                  with GitHub accounts.
                type: boolean
              name:
                description: Name is the display name of the GitHub identity provider
                  in Zitadel.
                type: string
              scopes:
                description: Scopes are the OAuth2 scopes to request from GitHub.
                items:
                  type: string
                type: array
            required:
            - clientId
            - clientSecretRef
            - name
            type: object
          status:
